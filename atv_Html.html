<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro Completo</title>
</head>

<body>
    <h1>Formulário de Cadastro</h1>
    <hr>

    <br><br>

    <form>
        <h2>Informações Pessoais</h2> <br>

        <label for="nome">Nome Completo</label> <br>
        <input type="text" id="nome"><br> <br>


        <label for="idade">Idade</label> <br>
        <input type="number" id="idade"> <br><br>

        <label for="email">Email</label> <br>
        <input type="email" id="email"> <br><br>

        <label for="data">Data de nascimento</label> <br>
        <input type="date" id="data"> <br><br>

        <label for="senha">Senha</label> <br>
        <input type="password" id="senha"> <br><br>

        <label for="telefone">Telefone</label> <br>
        <input type="tel" id="telefone"> <br><br>

        <label for="cidade">Cidade</label> <br>
        <input type="text" id="cidade"> <br> <br><br>

        <hr>

        <h2>Sexo</h2>
        <label for="sexo">Sexo</label> <br>
        <input type="radio">Masculino <br>
        <input type="radio">Feminino <br>
        <input type="radio">Prefiro não informar <br><br><br>

        <hr>
        <h2>Interesses</h2>

        <label>Interesse</label> <br>
        <input type="checkbox">T.I <br>
        <input type="checkbox">Gastronomia <br>
        <input type="checkbox">Jogos <br>
        <input type="checkbox">Esportes <br>
        <input type="checkbox">Música <br><br><br>

        <hr>

        <h2>Mensagem</h2>
        <label>Deixe sua mensagem</label> <br>
        <textarea cols="40" rows="40">  </textarea> <br>

        <button type="submit">Enviar</button> 
        <button type="reset">Limpar</button> <br>

    </form>
</body>

</html>
